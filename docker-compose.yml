version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: ci_debugger_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ci_debugger
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ci_debugger_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ci_debugger"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ci_debugger_pgdata: